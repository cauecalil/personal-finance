spring:
  application:
    name: personal-finance
  datasource:
    url: jdbc:h2:file:./finance;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

logging:
  level:
    org.cauecalil: INFO
    org.hibernate.SQL: WARN