app:
  heartbeat:
    enabled: false
    timeout-ms: 25000
    monitor-delay-ms: 5000
    startup-grace-ms: 15000
  desktop:
    open-browser-on-startup: false
    startup-url: http://${server.address}:${server.port}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
